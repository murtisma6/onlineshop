<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DBohra Mart | Global Dawoodi Bohra Community Marketplace</title>
    <meta name="description" content="The premier digital marketplace for the Dawoodi Bohra community. Create your online store, list products, and connect with Bohra businesses worldwide. Grow your business with DBohra Mart." />
    <meta name="keywords" content="Dawoodi Bohra, Bohra Business, Digital Store, Bohra Community, Online Marketplace, Bohra Products, DBohra Mart" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://dbohramart.com/" />
    <meta property="og:title" content="DBohra Mart | Global Dawoodi Bohra Community Marketplace" />
    <meta property="og:description" content="Empowering Dawoodi Bohra businesses with digital storefronts. Join our global community marketplace today." />
    <meta property="og:image" content="https://dbohramart.com/og-image.jpg" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://dbohramart.com/" />
    <meta property="twitter:title" content="DBohra Mart | Global Dawoodi Bohra Community Marketplace" />
    <meta property="twitter:description" content="Empowering Dawoodi Bohra businesses with digital storefronts. Join our global community marketplace today." />
    <meta property="twitter:image" content="https://dbohramart.com/og-image.jpg" />

    <link rel="sitemap" type="application/xml" title="Sitemap" href="/sitemap.xml" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "DBohra Mart",
      "url": "https://dbohramart.com/",
      "description": "Global marketplace for the Dawoodi Bohra community businesses.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://dbohramart.com/?search={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "DBohra Mart",
      "url": "https://dbohramart.com/",
      "logo": "https://dbohramart.com/logo.png",
      "description": "Empowering Dawoodi Bohra businesses with digital storefronts worldwide.",
      "sameAs": [
        "https://facebook.com/dbohramart",
        "https://instagram.com/dbohramart"
      ]
    }
    </script>
  </head>
  <body>
    <div id="root">
      <div style="display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; color: #1E3147;">
        <div style="text-align: center;">
          <h2>Loading DBohra Mart...</h2>
          <p>Please wait while we prepare your marketplace.</p>
        </div>
      </div>
    </div>
    
    <script>
      // Global error handler to catch mobile-specific crashes
      window.onerror = function(msg, url, line, col, error) {
        var errorDiv = document.createElement('div');
        errorDiv.style.position = 'fixed';
        errorDiv.style.top = '0';
        errorDiv.style.left = '0';
        errorDiv.style.width = '100%';
        errorDiv.style.height = '100%';
        errorDiv.style.backgroundColor = 'white';
        errorDiv.style.color = 'red';
        errorDiv.style.padding = '20px';
        errorDiv.style.zIndex = '9999';
        errorDiv.style.overflow = 'auto';
        errorDiv.innerHTML = '<h3>Application Error</h3>' +
          '<p><strong>Message:</strong> ' + msg + '</p>' +
          '<p><strong>Url:</strong> ' + url + '</p>' +
          '<p><strong>Line:</strong> ' + line + '</p>' +
          '<p>If you see this, please take a screenshot and send it to support.</p>';
        document.body.appendChild(errorDiv);
        return false;
      };
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
