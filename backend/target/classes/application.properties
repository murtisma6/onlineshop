spring.application.name=backend
server.port=8080

# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/onlineshop
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# File Upload limits (for image upload)
spring.servlet.multipart.max-file-size=300KB
spring.servlet.multipart.max-request-size=300KB

# Custom App Configuration
app.base-url=http://192.168.0.105:8080
app.frontend-url=http://192.168.0.105

# CORS (To allow React frontend to connect)
spring.mvc.cors.allowed-origins=http://localhost,${app.frontend-url}
spring.mvc.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.mvc.cors.allowed-headers=*
spring.mvc.cors.allow-credentials=true
